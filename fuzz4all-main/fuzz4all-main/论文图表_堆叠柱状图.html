<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图3-2 各API类别测试结果堆叠分布</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #fff; padding: 40px; }
h3 { text-align: center; color: #1E293B; margin-bottom: 20px; font-size: 16px; }
.wrap { max-width: 750px; margin: 0 auto; height: 350px; }
</style>
</head>
<body>
<h3>图3-2 各API类别测试结果堆叠分布</h3>
<div class="wrap"><canvas id="chart"></canvas></div>
<script>
const cats = [
  { n:'Thread',     s:35, f:15, e:0, t:0 },
  { n:'Duration',   s:40, f:20, e:0, t:0 },
  { n:'URI',        s:40, f:15, e:5, t:0 },
  { n:'MgmtFactory',s:39, f:21, e:0, t:0 },
  { n:'File',       s:27, f:23, e:0, t:0 },
  { n:'Method',     s:30, f:30, e:0, t:0 },
  { n:'Socket',     s:30, f:30, e:0, t:0 },
  { n:'Cipher',     s:23, f:27, e:0, t:0 },
  { n:'BufIS',      s:24, f:36, e:0, t:0 },
  { n:'PCS',        s:9,  f:51, e:0, t:0 },
];
new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: cats.map(c => c.n),
    datasets: [
      { label:'SAFE',    data:cats.map(c=>+(c.s/(c.s+c.f+c.e+c.t)*100).toFixed(1)), backgroundColor:'#16A34A', borderRadius:2 },
      { label:'ERROR',   data:cats.map(c=>+(c.e/(c.s+c.f+c.e+c.t)*100).toFixed(1)), backgroundColor:'#D97706', borderRadius:2 },
      { label:'TIMEOUT', data:cats.map(c=>+(c.t/(c.s+c.f+c.e+c.t)*100).toFixed(1)), backgroundColor:'#F59E0B', borderRadius:2 },
      { label:'FAILURE', data:cats.map(c=>+(c.f/(c.s+c.f+c.e+c.t)*100).toFixed(1)), backgroundColor:'#DC2626', borderRadius:2 },
    ]
  },
  options: {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ labels:{ color:'#64748B', font:{size:11} } },
      tooltip:{ callbacks:{ label:c=>` ${c.dataset.label}: ${c.parsed.y}%` } }
    },
    scales:{
      x:{ stacked:true, ticks:{ color:'#64748B', font:{size:11} }, grid:{ color:'rgba(226,232,240,.6)' } },
      y:{ stacked:true, max:100, ticks:{ color:'#64748B', font:{size:11}, callback:v=>v+'%' }, grid:{ color:'rgba(226,232,240,.6)' } }
    }
  }
});
</script>
</body>
</html>
