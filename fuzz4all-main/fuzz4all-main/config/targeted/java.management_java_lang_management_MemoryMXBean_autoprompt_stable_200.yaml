# Stable autoprompt configuration for java.lang.management.MemoryMXBean
# Documentation source: config/documentation/java.management_java_lang_management_MemoryMXBean.md

fuzzing:
  output_folder: outputs/verify_memory_mxbean_autoprompt_stable_200
  num: 200
  total_time: 24
  log_level: 3
  otf: true
  resume: false
  evaluate: false
  use_hand_written_prompt: false
  no_input_prompt: false
  prompt_strategy: 2
  target_name: javac

target:
  language: java
  java_version: 21
  enable_preview: true
  runtime_feedback_mode: normalized
  max_feedback_rules: 7
  max_safe_examples: 3
  prompt_refresh_interval: 2
  prompt_refresh_candidates: 1
  enable_mutation: true
  mutation_budget_per_seed: 2
  mutation_operator_topk: 5
  path_classification_result: outputs/api_classification/java_api_5d_classification.json
  path_documentation: config/documentation/java.management_java_lang_management_MemoryMXBean.md
  path_example_code:
  trigger_to_generate_input: "/* Please create a very short Java program that uses java.lang.management.MemoryMXBean in diverse and tricky ways. Use only standard JDK management and MXBean APIs. Focus on documented entry points such as ManagementFactory.getMemoryMXBean(), documented MemoryMXBean methods like getHeapMemoryUsage, getNonHeapMemoryUsage, getObjectPendingFinalizationCount, isVerbose, setVerbose, and gc, and documented MemoryUsage getters such as getUsed, getCommitted, getInit, and getMax. Keep to public JDK management interfaces, use correct return types, and avoid fabricated bean methods, guessed short-form getters like getHeapUsage or getMemoryCount, ObjectName/proxy paths, or non-JDK wrappers. */"
  input_hint: "import java.lang.management.ManagementFactory; import java.lang.management.MemoryMXBean; import java.lang.management.MemoryUsage;"
  path_hand_written_prompt:
  target_string: "MemoryMXBean"

llm:
  temperature: 0.9
  batch_size: 30
  device: cuda
  model_name: Qwen/Qwen2.5-Coder-7B-Instruct
  max_length: 1024
  autoprompt_model: deepseek-chat
  autoprompt_candidates: 4
  autoprompt_temperature: 0.7
  autoprompt_greedy_temperature: 0.2
  autoprompt_max_tokens: 256
  autoprompt_validation_batch_size: 10
  autoprompt_validation_max_length: 192
  runtime_autoprompt_model: deepseek-chat
  runtime_autoprompt_temperature: 0.6
  runtime_autoprompt_max_tokens: 256
  runtime_refresh_validation_batch_size: 5
  runtime_refresh_validation_max_length: 192
